function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function calcMatch(pe,pd,ps,pref){
  const d = Math.sqrt((pe-pref.econ)**2+(pd-pref.diplo)**2+(ps-pref.social)**2);
  return 1 - d/Math.sqrt(3*200*200);
}

function ideologyLabel(v){
  if(v<=-60)return"強左"; if(v<=-20)return"中道左"; if(v<=20)return"中道";
  if(v<=60)return"中道右"; return"強右";
}

// 知名度を考慮した支持率の上限（知名度がキャップ）
function cappedSupport(rawSupport, fame){
  return Math.min(rawSupport, fame * 0.4); // 例：知名度100でも支持率は最大40%
}

// 支持率が高いほど上昇しにくい減衰補正
function decayFactor(currentPct){
  if(currentPct < 5) return 1.0;
  if(currentPct < 15) return 0.6;
  if(currentPct < 25) return 0.3;
  if(currentPct < 35) return 0.15;
  return 0.05; // 35%を超えると絶望的に上がらなくなる
}

// 無党派層の割合（各県の残り）
function independentShare(allSupports){ 
  // 文字列の足し算を防ぐため Number() でキャスト
  const total = Object.values(allSupports).reduce((s,v) => s + Number(v), 0);
  return Math.max(0, 100 - total);
}

// ドント式議席配分（NaN対策と空転防止を強化）
function dontMethod(parties, totalSeats){
  const seats = Object.fromEntries(parties.map(p=>[p.id,0]));
  const tSeats = Number(totalSeats) || 0; // 定数が不正な場合のフェイルセーフ

  for(let i=0; i<tSeats; i++){
    let best = null, bestQ = -1;
    parties.forEach(p=>{
      // 票数が NaN の場合は 0 として扱う
      const validVotes = Number.isNaN(Number(p.votes)) ? 0 : Number(p.votes);
      const q = validVotes / (seats[p.id]+1);
      
      // q が NaN でないことを確認してから比較
      if(q > bestQ && !Number.isNaN(q)){ 
        bestQ = q; 
        best = p.id; 
      }
    });
    
    // 全員0票などでbestが決まらなかった場合の救済措置（議席の消滅を絶対防ぐ）
    if(best === null && parties.length > 0) {
      best = parties[0].id;
    }
    
    if(best) seats[best]++;
  }
  return seats;
}

// ブロック別PR議席計算（比例代表）
function calcPRSeats(prefSupport, rivalSupport, playerPartyId, playerFame, rivalFames){
  const totalPR = { [playerPartyId]: 0 };
  RIVALS_DEF.forEach(r => totalPR[r.id] = 0);

  // 1. 各ブロックでのドント式配分
  BLOCKS.forEach(block=>{
    const prefs = PREFECTURES.filter(p=>p.block===block.id);
    if(prefs.length === 0) return;

    const partyAvg = { [playerPartyId]: 0 };
    RIVALS_DEF.forEach(r => partyAvg[r.id] = 0);

    prefs.forEach(p => {
      partyAvg[playerPartyId] += Number(prefSupport[p.id] || 0);
      RIVALS_DEF.forEach(r => {
        partyAvg[r.id] += Number(((rivalSupport[r.id]||{})[p.id]) || 0);
      });
    });

    Object.keys(partyAvg).forEach(pid => partyAvg[pid] /= prefs.length);

    const totalSup = Object.values(partyAvg).reduce((sum, val) => sum + val, 0);
    const indep = Math.max(0, 100 - totalSup);
    const distributeVotes = indep * 0.8;

    const partyVotes = Object.keys(partyAvg).map(pid => {
      let votes = partyAvg[pid];
      if (totalSup > 0) {
        votes += distributeVotes * (partyAvg[pid] / totalSup);
      } else {
        votes += distributeVotes / Object.keys(partyAvg).length;
      }
      votes += Math.random() * 0.0001;
      return { id: pid, votes: Number.isNaN(votes) ? 0 : votes };
    });

    // 定数プロパティの名前が異なっていても取得できるようにする
    const prCount = block.prSeats || block.pr || block.seats || 0;
    const blockSeats = dontMethod(partyVotes, prCount);
    
    Object.entries(blockSeats).forEach(([pid, s]) => {
      totalPR[pid] += s;
    });
  });

  // ━━━━ ▼ 絶対に176議席（総計465議席）にするための最終補正 ▼ ━━━━
  const TARGET_PR_SEATS = 176; // 比例代表の総定数 (465 - 289)
  let currentTotalPr = Object.values(totalPR).reduce((sum, val) => sum + val, 0);

  if (currentTotalPr !== TARGET_PR_SEATS) {
    const diff = TARGET_PR_SEATS - currentTotalPr;
    
    // 足りない（または多すぎる）議席を、一番比例議席を獲得している政党で調整する
    let topPartyId = playerPartyId;
    let maxSeats = -1;
    
    Object.entries(totalPR).forEach(([pid, seats]) => {
      if (seats > maxSeats) {
        maxSeats = seats;
        topPartyId = pid;
      }
    });

    // トップの政党に差分を足し引きして強制的に辻褄を合わせる
    totalPR[topPartyId] += diff;
    
    // 万が一マイナスになった場合は0に戻し、プレイヤーの議席で無理やり合わせる
    if (totalPR[topPartyId] < 0) {
        totalPR[topPartyId] = 0;
        let newTotal = Object.values(totalPR).reduce((sum, val) => sum + val, 0);
        totalPR[playerPartyId] += (TARGET_PR_SEATS - newTotal);
    }
  }
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  return totalPR;
}

// 小選挙区議席計算（各県で1位の党が総取り）

  RIVALS_DEF.forEach(r => totalSMD[r.id] = 0);

  PREFECTURES.forEach(pref=>{
    // 全て Number() で明示的に数値変換
    const partyPct = { [playerPartyId]: Number(prefSupport[pref.id] || 0) };
    RIVALS_DEF.forEach(r=>{
      partyPct[r.id] = Number(((rivalSupport[r.id]||{})[pref.id])||0);
    });

    const totalSup = Object.values(partyPct).reduce((sum, val) => sum + val, 0);
    const indep = Math.max(0, 100 - totalSup);
    const distributeVotes = indep * 0.8;

    const finalPcts = Object.keys(partyPct).map(pid => {
      let pct = partyPct[pid];
      if (totalSup > 0) {
        pct += distributeVotes * (partyPct[pid] / totalSup);
      } else {
        pct += distributeVotes / Object.keys(partyPct).length;
      }
      pct += Math.random() * 0.0001; 
      
      // 万が一の NaN を 0 に変換
      return { id: pid, pct: Number.isNaN(pct) ? 0 : pct };
    });

    // ここで NaN が無いことが保証されているため、正常に勝敗が決まる
    const winner = finalPcts.reduce((a,b) => a.pct > b.pct ? a : b);
    
    // 定数プロパティの名前が異なっていても取得できるようにする
    const smdCount = pref.smd || pref.smdSeats || pref.seats || 0;
    totalSMD[winner.id] += Number(smdCount);
  });

  return totalSMD;
}

function blockAvgSupport(blockId, prefSupport){
  const prefs = PREFECTURES.filter(p=>p.block===blockId);
  if(!prefs.length) return 0;
  return prefs.reduce((s,p)=>s+(prefSupport[p.id]||0),0)/prefs.length;
}

function supportColor(pct){
  if(pct<3)  return"#1e293b";
  if(pct<10) return"#312e5a";
  if(pct<18) return"#4c1d95";
  if(pct<26) return"#7c3aed";
  if(pct<34) return"#a855f7";
  if(pct<42) return"#e11d48";
  if(pct<50) return"#f97316";
  return"#eab308";
}

// SETUP SCREEN（政党選択 or 新党設立）
// ════════════════════════════════════════════════════════════
function SetupScreen({ onStart }){
  const [mode, setMode] = useState(null); // "existing" | "new"
  const [selectedRival, setSelectedRival] = useState(null);
  const [partyName, setPartyName] = useState("");
  const [econ, setEcon] = useState(0);
  const [diplo, setDiplo] = useState(0);
  const [social, setSocial] = useState(0);
  const [homeBlock, setHomeBlock] = useState(null);
  const [partyColor, setPartyColor] = useState("#e11d48");

  function buildInitialState(name, color, pe, pd, ps, fame0, home){
    const prefSupport={}, prefFame={}, rivalSupport={};
    PREFECTURES.forEach(p=>{
      const m=calcMatch(pe,pd,ps,p);
      const homeBonus=(p.block===home)?5:0; // 12から5へ減少
      const baseFame=clamp(fame0+(Math.random()-0.5)*8,5,100);
      prefFame[p.id]=baseFame;
      const rawSup=clamp(m*30+0+homeBonus+(Math.random()-0.5)*6,1,50);
      prefSupport[p.id]=clamp(rawSup, 0, baseFame*0.7);
    });
    RIVALS_DEF.forEach(r=>{
      const rs={};
      PREFECTURES.forEach(p=>{
        const m=calcMatch(r.econ,r.diplo,r.social,p);
        rs[p.id]=clamp(m*38+5+(Math.random()-0.5)*8,2,45);
      });
      rivalSupport[r.id]=rs;
    });
    return{prefSupport,prefFame,rivalSupport};
  }

  function handleExistingStart(){
    const r=RIVALS_DEF.find(x=>x.id===selectedRival);
    if(!r) return;
    // 選んだライバルを「プレイヤー」として使用、残りがライバルに
    const remainingRivals=RIVALS_DEF.filter(x=>x.id!==selectedRival);
    const {prefSupport,prefFame,rivalSupport}=buildInitialState(r.name,r.color,r.econ,r.diplo,r.social,90,null);
    // 選択した政党は初期知名度90前後、支持率も高め
    const adjSup={};
    PREFECTURES.forEach(p=>{
      const m=calcMatch(r.econ,r.diplo,r.social,p);
      // ▼ 修正：既存政党でも初期支持率を抑えめ（上限も40など）にする
      adjSup[p.id]=clamp(m*20+5+(Math.random()-0.5)*6,3,40);
    });
    onStart({
      partyName:r.name, partyColor:r.color,
      econ:r.econ, diplo:r.diplo, social:r.social,
      homeBlock:null, initFame:90,
      prefSupport:adjSup, prefFame, rivalSupport,
      rivalDefs:remainingRivals.map(rv=>({...rv})),
      isExisting:true,
    });
  }

  function handleNewStart(){
    if(!partyName.trim()||!homeBlock) return;
    const {prefSupport,prefFame,rivalSupport}=buildInitialState(partyName,partyColor,econ,diplo,social,8,homeBlock);
    onStart({
      partyName:partyName.trim(), partyColor, econ, diplo, social,

  const s={

  if(!mode) return(
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontSize:11,color:"#e11d48",letterSpacing:3,marginBottom:8,fontWeight:700}}>日本総選挙シミュレーション v2</div>

      <p style={{fontSize:12,color:"#6b7280",marginBottom:32,textAlign:"center"}}>総議席数 465（小選挙区289 + 比例176）　過半数233議席</p>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center"}}>

          🏛️ 既存政党の党首としてプレイ<br/>

        <button onClick={()=>setMode("new")}
          style={{background:"linear-gradient(135deg,#7c3aed,#a855f7)",border:"none",borderRadius:16,padding:"20px 28px",color:"white",fontSize:14,fontWeight:700,cursor:"pointer",maxWidth:220,textAlign:"center",lineHeight:1.6}}>
          🌱 新党を設立してプレイ<br/>
          <span style={{fontSize:10,opacity:.8}}>知名度5〜10%スタート<br/>ゼロからの挑戦</span>
        </button>
      </div>
    </div>
  );

  if(mode==="existing") return(
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#b91c1c",padding:"8px 16px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:2,border:"1px solid rgba(255,255,255,0.6)",padding:"2px 6px"}}>選挙SIM v2</span>
        <span style={{fontSize:13,fontWeight:700}}>既存政党を選択</span>
        <button onClick={()=>setMode(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer"}}>← 戻る</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16,maxWidth:520,margin:"0 auto",width:"100%"}}>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:16,lineHeight:1.7}}>
          選んだ政党の党首として選挙戦を戦います。知名度は高い状態からスタートします。選ばなかった政党はライバルとして登場します。
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          {RIVALS_DEF.map(r=>(
            <button key={r.id} onClick={()=>setSelectedRival(r.id)}
              style={{background:selectedRival===r.id?r.color+"22":"#111827",border:`2px solid ${selectedRival===r.id?r.color:"#374151"}`,borderRadius:12,padding:14,textAlign:"left",color:"white",transition:"all .2s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:r.color}}/>
                <span style={{fontSize:15,fontWeight:700}}>{r.name}</span>
                <span style={{marginLeft:"auto",fontSize:10,background:r.color+"33",color:r.color,padding:"2px 8px",borderRadius:10}}>知名度 {r.initFame}%</span>
              </div>
              <p style={{fontSize:11,color:"#9ca3af"}}>{r.desc}</p>
              <div style={{display:"flex",gap:8,marginTop:8}}>
                {[["経済",r.econ],["外交",r.diplo],["社会",r.social]].map(([l,v])=>(
                  <span key={l} style={{fontSize:10,background:"#1f2937",padding:"2px 8px",borderRadius:6,color:"#cbd5e1"}}>
                    {l}: {ideologyLabel(v)}
                  </span>
                ))}
              </div>
            </button>
          ))}
        </div>
        <button onClick={handleExistingStart} disabled={!selectedRival}
          style={{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:selectedRival?"pointer":"not-allowed",background:selectedRival?(RIVALS_DEF.find(r=>r.id===selectedRival)?.color||"#374151"):"#374151",color:selectedRival?"white":"#6b7280",fontSize:14,fontWeight:700}}>
          この政党で選挙戦を開始 →
        </button>
      </div>
    </div>
  );

  // mode === "new"
  const canStart = partyName.trim().length>0 && homeBlock!==null;
  return(
    <div style={{minHeight:"100vh",background:"#030712",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#7c3aed",padding:"8px 16px",display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:11,fontWeight:700,letterSpacing:2,border:"1px solid rgba(255,255,255,0.6)",padding:"2px 6px"}}>選挙SIM v2</span>
        <span style={{fontSize:13,fontWeight:700}}>新党設立 — 知名度5〜10%からの挑戦</span>
        <button onClick={()=>setMode(null)} style={{marginLeft:"auto",background:"none",border:"none",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer"}}>← 戻る</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:16,maxWidth:520,margin:"0 auto",width:"100%"}}>
        <div style={{background:"rgba(124,58,237,0.15)",border:"1px solid rgba(124,58,237,0.4)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#c4b5fd",lineHeight:1.7}}>
          ⚠️ 新党設立モード：知名度がゼロに近い状態からのスタート。まず知名度を上げないと支持率が伸びません。難易度は高め。
        </div>
        <div style={s.card}>
          <span style={s.label}>政党名</span>
          <input value={partyName} onChange={e=>setPartyName(e.target.value)} maxLength={20} placeholder="例：国民改革党"
            style={{width:"100%",background:"#1f2937",border:"1px solid #374151",borderRadius:8,padding:"8px 12px",color:"white",fontSize:15,fontWeight:700,fontFamily:"inherit",boxSizing:"border-box"}}/>
        </div>
        <div style={s.card}>
          <span style={s.label}>政党カラー</span>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["#e11d48","#2563eb","#16a34a","#d97706","#7c3aed","#0891b2","#dc2626","#65a30d"].map(c=>(
              <button key={c} onClick={()=>setPartyColor(c)}
                style={{width:32,height:32,borderRadius:"50%",background:c,border:`2px solid ${partyColor===c?"white":"transparent"}`}}/>
            ))}
          </div>
        </div>
        <div style={s.card}>
          <span style={s.label}>政治思想（3軸）</span>
          {[
            {label:"💴 経済軸",val:econ,set:setEcon,l:"財政出動・格差是正",r:"構造改革・緊縮"},
            {label:"🛡 外交・安保軸",val:diplo,set:setDiplo,l:"リベラル・対話",r:"保守・防衛強化"},
            {label:"🌸 社会軸",val:social,set:setSocial,l:"多様性・進歩主義",r:"伝統・保守主義"},
          ].map(ax=>(
            <div key={ax.label} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:11,color:"#9ca3af"}}>{ax.label}</span>
                <span style={{fontSize:11,fontWeight:700,color:"#fbbf24"}}>{ideologyLabel(ax.val)} ({ax.val>0?"+":""}{ax.val})</span>
              </div>
              <input type="range" min="-100" max="100" step="1" value={ax.val}
                onChange={e=>ax.set(parseInt(e.target.value))} style={{width:"100%",accentColor:partyColor}}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
                <span style={{fontSize:9,color:"#4b5563"}}>{ax.l}</span>
                <span style={{fontSize:9,color:"#4b5563"}}>{ax.r}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={s.card}>
          <span style={s.label}>本拠地（知名度初期+20%ボーナス）</span>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {BLOCKS.map(b=>{
              const prefs=PREFECTURES.filter(p=>p.block===b.id);
              const avgMatch=prefs.reduce((s,p)=>s+calcMatch(econ,diplo,social,p),0)/prefs.length;
              const isHome=homeBlock===b.id;
              return(
                <button key={b.id} onClick={()=>setHomeBlock(b.id)}
                  style={{borderRadius:8,padding:"8px 10px",border:`1px solid ${isHome?"#7c3aed":"#374151"}`,background:isHome?"rgba(124,58,237,0.1)":"#1f2937",textAlign:"left",color:"white"}}>
                  <div style={{fontSize:11,fontWeight:700}}>{b.name}</div>
                  <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>{prefs.reduce((s,p)=>s+p.smd,0)}選挙区</div>
                  <div style={{fontSize:9,marginTop:4,color:avgMatch>=0.55?"#22c55e":avgMatch>=0.4?"#f59e0b":"#6b7280"}}>相性 {Math.round(avgMatch*100)}%</div>
                </button>
              );
            })}
          </div>
        </div>
        <button onClick={handleNewStart} disabled={!canStart}
          style={{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:canStart?"pointer":"not-allowed",background:canStart?partyColor:"#374151",color:canStart?"white":"#6b7280",fontSize:14,fontWeight:700,fontFamily:"inherit",marginBottom:20}}>

// GAME SCREEN
// ════════════════════════════════════════════════════════════
function GameScreen({ setup, onElection }){
  const [turn, setTurn] = useState(1);
  const [ap, setAp] = useState(MAX_AP); // 残り行動ポイント
  const [funds, setFunds] = useState(500);
  const [prefSupport, setPrefSupport] = useState(setup.prefSupport);
  const [prefFame, setPrefFame] = useState(setup.prefFame);
  const [rivalSupport, setRivalSupport] = useState(setup.rivalSupport);
  const [members, setMembers] = useState([makeMember(),makeMember()]);
  const [selectedBlockId, setSelectedBlockId] = useState(null);
  const [selectedPrefId, setSelectedPrefId] = useState(null);
  const [log, setLog] = useState(["第1週：選挙戦が始まった！"]);
  const [showPolling, setShowPolling] = useState(false);
  const [showMembers, setShowMembers] = useState(false);
  const [showPrefSelector, setShowPrefSelector] = useState(false);
  const [currentNews, setCurrentNews] = useState(null);
  const [usedNewsIds, setUsedNewsIds] = useState([]);
  const [notif, setNotif] = useState(null);
  const [tab, setTab] = useState("map");
  const [pendingAction, setPendingAction] = useState(null); // 演説中の都道府県ID

  const isElectionPhase = turn >= ELECTION_TURN;
  const avgSupport = Math.round(
    PREFECTURES.reduce((s,p)=>s+(prefSupport[p.id]||0)*p.pop,0)/
    PREFECTURES.reduce((s,p)=>s+p.pop,0)
  );
  const avgFame = Math.round(
    PREFECTURES.reduce((s,p)=>s+(prefFame[p.id]||0),0)/PREFECTURES.length
  );

  const rivalDefs = setup.rivalDefs || RIVALS_DEF;

  function showNotif(msg,type="info"){
    setNotif({msg,type});
    setTimeout(()=>setNotif(null),2500);
  }
  function addLog(msg){ setLog(l=>[`第${turn}週: ${msg}`,...l.slice(0,29)]); }

  function useAP(cost=1){
    setAp(prev=>Math.max(0,prev-cost));
  }

  function generateNews(){
    const available=NEWS_POOL.map((n,i)=>({n,i})).filter(({i})=>!usedNewsIds.includes(i));
    if(!available.length) return;
    const pick=available[Math.floor(Math.random()*available.length)];
    setUsedNewsIds(p=>[...p,pick.i]);
    if(pick.n.rivalPenalty){
      setRivalSupport(prev=>{
        const next={...prev};
        const rs={...(next[pick.n.rivalPenalty]||{})};
        PREFECTURES.forEach(p=>{ rs[p.id]=clamp((rs[p.id]||15)-(2+Math.random()*3),1,60); });
        next[pick.n.rivalPenalty]=rs;
        return next;
      });
    }
    setCurrentNews(pick.n);
  }

  function applyPassiveBoosts(ps,pf){
    const ns={...ps},nf={...pf};
    members.forEach(m=>{
      if(m.location==="HQ") return;
      const boost=m.level*0.3;
      const prefs=PREFECTURES.filter(p=>p.block===m.location);
      prefs.forEach(p=>{
        nf[p.id]=clamp((nf[p.id]||0)+boost*0.5,0,100);
        const cap=nf[p.id]*0.7;
        ns[p.id]=clamp((ns[p.id]||0)+boost*decayFactor(ns[p.id]||0),0,cap);
      });
    });
    return{ns,nf};
  }

  function applyRivalAI(rs){
  const next={...rs};
  rivalDefs.forEach(r=>{
    next[r.id]={...(next[r.id]||{})};
    // 全47都道府県でそれぞれ判定を行う
    PREFECTURES.forEach(pref=>{
      const cur = next[r.id][pref.id] || 10;
      
      // aggression（攻撃性）に応じて各地で支持率を伸ばす
      if(Math.random() < r.aggression * 0.4){
        // 上昇幅にばらつきを持たせる（基本は0〜1.5%、たまに+1.5%のボーナス）
        let gain = Math.random() * 1.5;
        if(Math.random() < 0.2) gain += 1.5; // 20%の確率でその地域に注力したような大きな伸び

        // 上限を30（30%）に調整
        next[r.id][pref.id] = clamp(cur + gain, 1, 30);
      } else {
        // 成長判定から漏れた地域は、支持率が微減（自然減）するようにする
        // これにより、全国一律に育つのではなく、地域ごとの「ばらつき」が強調される
        next[r.id][pref.id] = clamp(cur - Math.random() * 0.4, 1, 30);
      }
    });
  });
  return next;
}

  function nextTurn(){
    if(turn>=TOTAL_TURNS){ onElection(prefSupport,prefFame,rivalSupport); return; }
    const{ns,nf}=applyPassiveBoosts(prefSupport,prefFame);
    // 自然変動
    PREFECTURES.forEach(p=>{
      const drift=(Math.random()-0.52)*0.6;
      const cap=nf[p.id]*0.7;
      ns[p.id]=clamp((ns[p.id]||0)+drift,0,cap);
      nf[p.id]=clamp((nf[p.id]||0)+(Math.random()-0.5)*0.3,0,100);
    });
    setPrefSupport(ns);
    setPrefFame(nf);
    setRivalSupport(prev=>applyRivalAI(prev));
    const nt=turn+1;
    setTurn(nt);
    setAp(MAX_AP);
    setSelectedPrefId(null);
    setSelectedBlockId(null);
    if(nt%2===0) generateNews();
    if(nt===ELECTION_TURN){ addLog("⚡ 選挙期間突入！情勢調査が解禁"); showNotif("選挙期間突入！情勢調査を確認","success"); }
    else addLog("次の週が始まった");
  }

  // ── ACTIONS ──────────────────────────────────────────────
  function doSpeech(prefId){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    const pref=PREFECTURES.find(p=>p.id===prefId);
    const blockMembers=members.filter(m=>m.location===pref.block).length;
    const fameBefore=prefFame[prefId]||0;
    const fameGain=clamp(0.5+Math.random()*1.0,0,100-fameBefore); // 知名度は0.5〜1.5%しか上がらない
    const newFame=clamp(fameBefore+fameGain,0,100);
    const cap=newFame*0.7;
    const base=(0.5+Math.random()*0.8)*decayFactor(prefSupport[prefId]||0)*(1+blockMembers*0.35); // 党員バフも0.4→0.2へ
    const supGain=clamp(base,0,cap-(prefSupport[prefId]||0));
    setPrefFame(prev=>({...prev,[prefId]:newFame}));
    setPrefSupport(prev=>({...prev,[prefId]:clamp((prev[prefId]||0)+supGain,0,cap)}));
    addLog(`${pref.name}で街頭演説 知名+${fameGain.toFixed(1)}% 支持+${supGain.toFixed(1)}%`);
    showNotif(`${pref.name}で演説！知名度↑ 支持+${supGain.toFixed(1)}%`,"success");
    useAP(1);
  }

  function doCM(blockId){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    if(funds<40){ showNotif("資金不足（40万円必要）","error"); return; }
    const prefs=PREFECTURES.filter(p=>p.block===blockId);
    const fameGain=2+Math.random()*2;
    const newFame={...prefFame};
    const newSup={...prefSupport};
    prefs.forEach(p=>{
      newFame[p.id]=clamp((newFame[p.id]||0)+fameGain,0,100);
      const cap=newFame[p.id]*0.7;
      const g=(2+Math.random()*2)*decayFactor(newSup[p.id]||0);
      newSup[p.id]=clamp((newSup[p.id]||0)+g,0,cap);
    });
    setPrefFame(newFame);
    setPrefSupport(newSup);
    setFunds(f=>f-40);
    const bname=BLOCKS.find(b=>b.id===blockId)?.name||blockId;
    addLog(`${bname}で地方CM投下 -40万円`);
    showNotif(`${bname}でCM配信！知名度・支持率UP`,"success");
    useAP(1);
  }

  function doNetAd(){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    if(funds<60){ showNotif("資金不足（60万円必要）","error"); return; }
    const newFame={...prefFame};
    const newSup={...prefSupport};
    PREFECTURES.forEach(p=>{
      newFame[p.id]=clamp((newFame[p.id]||0)+0.5+Math.random()*0.5,0,100);
      const cap=newFame[p.id]*0.7;
      const g=0.4*decayFactor(newSup[p.id]||0);
      newSup[p.id]=clamp((newSup[p.id]||0)+g,0,cap);
    });
    setPrefFame(newFame);
    setPrefSupport(newSup);
    setFunds(f=>f-60);
    addLog(`ネット広告配信 -60万円 全国知名度・支持率↑`);
    showNotif("ネット広告が全国に拡散！","success");
    useAP(1);
  }

  function doPolicy(){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    if(funds<30){ showNotif("資金不足（30万円必要）","error"); return; }
    const newSup={...prefSupport};
    PREFECTURES.forEach(p=>{
      const m=calcMatch(setup.econ,setup.diplo,setup.social,p);
      const g=m*0.8*decayFactor(newSup[p.id]||0);
      const cap=(prefFame[p.id]||0)*0.7;
      newSup[p.id]=clamp((newSup[p.id]||0)+g,0,cap);
    });
    setPrefSupport(newSup);
    setFunds(f=>f-30);
    addLog(`政策発表 -30万円 思想一致地域で支持率↑`);
    showNotif("政策発表！共鳴する地域で支持拡大","success");
    useAP(1);
  }

  function doFundraise(){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    const earn=10+Math.floor(Math.random()*50); // 一度の資金調達で得られる額を大幅カット
    setFunds(f=>f+earn);
    addLog(`資金パーティー +${earn}万円`);
    showNotif(`${earn}万円調達！`,"info");
    useAP(1);
  }

  function doPressBriefing(){
    if(ap<=0){ showNotif("この週の行動回数が上限です","error"); return; }
    if(funds<20){ showNotif("資金不足（20万円必要）","error"); return; }
    const newFame={...prefFame};
    PREFECTURES.forEach(p=>{
      newFame[p.id]=clamp((newFame[p.id]||0)+1.2+Math.random(),0,100);
    });
    setPrefFame(newFame);
    setFunds(f=>f-20);
    addLog(`記者会見開催 -20万円 全国知名度↑`);
    showNotif("記者会見！全国の知名度が上昇","success");
    useAP(1);
  }

  function recruitMembers(n){
    if(funds<50*n){ showNotif("資金不足","error"); return; }
    setMembers(prev=>[...prev,...Array.from({length:n},()=>makeMember())]);
    setFunds(f=>f-50*n);
    showNotif(`${n}人の党員を採用！`,"success");
    addLog(`党員${n}人採用`);
  }

  function deployMember(memberId,blockId){
    setMembers(prev=>prev.map(m=>m.id===memberId?{...m,location:blockId}:m));
    if(blockId==="HQ") showNotif("党員を本部に召還","info");
    else showNotif(`${BLOCKS.find(b=>b.id===blockId)?.name}に党員を派遣！`,"success");
  }

  // ライバルの全国平均

// ELECTION SCREEN（開票・結果）
// ════════════════════════════════════════════════════════════
function ElectionScreen({ setup, finalPrefSupport, finalPrefFame, finalRivalSupport, onRestart }){
  const [confirmedBlocks, setConfirmedBlocks] = useState([]);
  const [displaySupport, setDisplaySupport] = useState(Object.fromEntries(PREFECTURES.map(p=>[p.id,0])));
  const [phase, setPhase] = useState("counting");
  const [animSeats, setAnimSeats] = useState(0);

  const rivalDefs = setup.rivalDefs || RIVALS_DEF;

 // 最終議席計算
  const smdResult = calcSMDSeats(finalPrefSupport, finalRivalSupport, "player", {}, {});
  const prResult  = calcPRSeats(finalPrefSupport, finalRivalSupport, "player", {}, {});
  
  let playerSMD  = smdResult["player"]||0;
  let playerPR   = prResult["player"]||0;

  let rivalTotals = rivalDefs.map(r=>({
    ...r,
    smd: smdResult[r.id]||0,
    pr: prResult[r.id]||0,
  }));

  // ━━━━ ▼ 絶対に小選挙区を289にする強制補正 ▼ ━━━━
  const TARGET_SMD = 289;
  let currentTotalSMD = playerSMD + rivalTotals.reduce((s, r) => s + r.smd, 0);
  
  if (currentTotalSMD !== TARGET_SMD) {
    const diffSMD = TARGET_SMD - currentTotalSMD;
    // 一番小選挙区で勝っているライバル政党を探す
    let topRival = rivalTotals.reduce((a, b) => a.smd > b.smd ? a : b, rivalTotals[0]);
    
    if (playerSMD > topRival.smd) {
      playerSMD += diffSMD; // プレイヤーが第一党ならプレイヤーに足し引き
    } else {
      topRival.smd += diffSMD; // ライバルが第一党ならライバルに足し引き
    }
  }

  // ━━━━ ▼ 絶対に比例を176にする強制補正 ▼ ━━━━
  const TARGET_PR = 176;
  let currentTotalPR = playerPR + rivalTotals.reduce((s, r) => s + r.pr, 0);
  
  if (currentTotalPR !== TARGET_PR) {
    const diffPR = TARGET_PR - currentTotalPR;
    // 一番比例議席を持っているライバル政党を探す
    let topRival = rivalTotals.reduce((a, b) => a.pr > b.pr ? a : b, rivalTotals[0]);
    
    if (playerPR > topRival.pr) {
      playerPR += diffPR;
    } else {
      topRival.pr += diffPR;
    }
  }

  // ━━━━ ▼ 最終的な合計（total）を再計算 ▼ ━━━━
  const playerTotal = playerSMD + playerPR;
  rivalTotals = rivalTotals.map(r => ({
    ...r,
    total: r.smd + r.pr
  }));
  // エンディング判定
  // エンディング判定
  function getEnding(seats){
    // ━━━━ 新党モードのエンディング ━━━━
    if(setup.isNewParty){ // ※セットアップ時の新党判定フラグ（必要に応じて条件式を調整してください）
      if(seats >= 20) return {
        title: "🎉 歴史的快挙！新党が国会を席巻",
        body: `${seats}議席を獲得。結党間もない新党が一大勢力となり、既存の政治を根底から覆す歴史的な大波乱を起こしました！`,
        color: "#fbbf24", grade: "伝説的勝利"
      };
      if(seats >= 6) return {
        title: "🌪️ 新党大旋風！",
        body: `${seats}議席を獲得。比例復活も含めて各地で議席をもぎ取り、国会で無視できない台風の目となりました。`,
        color: "#22c55e", grade: "大躍進"
      };
      if(seats >= 2) return {
        title: "⭐ 新党躍進！複数議席を獲得",
        body: `${seats}議席を獲得！政党要件（5議席）の達成も視野に入り、新党として確かな足がかりを掴みました。`,
        color: "#60a5fa", grade: "躍進"
      };
      if(seats === 1) return {
        title: "✨ 1議席を獲得！新党躍進",
        body: `激戦を制し、ついに悲願の1議席を獲得！たった1議席でも、国政に新しい声を届けるための偉大な第一歩です。`,
        color: "#f472b6", grade: "第一歩"
      };
      return {
        title: "😞 議席獲得ならず...",
        body: `健闘したものの、既存政党の厚い壁に阻まれ議席獲得には届きませんでした。次なる挑戦に向けた地道な活動がここから始まります。`,
        color: "#9ca3af", grade: "敗北"
      };
    }

    // ━━━━ 既存政党モードのエンディング（ハードル高め） ━━━━
    if(seats >= MAJORITY) return {
      title: "🎉 歴史的勝利！政権交代達成！",
      body: `${setup.partyName}が過半数（${MAJORITY}議席）を突破。単独過半数での政権交代が実現しました。新しい時代の幕開けです。`,
      color: "#fbbf24", grade: "完全クリア"
    };
    if(seats >= 100) return {
      title: "⭐ 大躍進！強力な野党第一党へ",
      body: `${seats}議席を獲得しました。政権獲得には届きませんでしたが、強力な野党第一党として次回に期待がかかります。`,
      color: "#22c55e", grade: "大善戦"
    };
    if(seats >= 50) return {
      title: "⚖️ 健闘。国会のキャスティングボートを握る",
      body: `${seats}議席を獲得。与野党の勢力図を左右する重要なポジションを確立しました。地道な党勢拡大が実を結びました。`,
      color: "#60a5fa", grade: "健闘"
    };
    if(seats > 10) return {
      title: "😞 敗北。野党のワン・オブ・ゼムへ",
      body: `${seats}議席にとどまりました。現有議席の維持すら厳しく、党内からは執行部の責任を問う声が上がっています。`,
      color: "#f97316", grade: "敗北"
    };
    return {
      title: "💀 党首辞任、そして党の解散へ...",
      body: `獲得議席わずか${seats}。国民の支持を全く得られず、主要メンバーは次々と離党。${setup.partyName}は歴史の波に飲まれ消滅しました。`,
      color: "#ef4444", grade: "ゲームオーバー"
    };
  }

  const ending = getEnding(playerTotal);

  const avgSup = Math.round(PREFECTURES.reduce((s,p)=>s+(finalPrefSupport[p.id]||0)*p.pop,0)/PREFECTURES.reduce((s,p)=>s+p.pop,0));

  return(
    <div style={{minHeight:"100vh",background:"#030712",color:"white",fontFamily:"'Hiragino Kaku Gothic ProN',Meiryo,sans-serif",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
      {/* TV Header */}
      <div style={{background:"#b91c1c",padding:"7px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{fontSize:10,fontWeight:700,letterSpacing:2,border:"1px solid rgba(255,255,255,0.6)",padding:"2px 6px"}}>NES</span>
        <span style={{fontSize:12,fontWeight:700}}>■ 衆議院総選挙（465議席）開票速報 ■ {setup.partyName}</span>
        <span style={{fontSize:10,color:"rgba(255,255,255,0.7)",marginLeft:"auto",fontWeight:700,animation:"pulse 1s infinite"}}>● LIVE</span>
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* MAP */}
        <div style={{flex:1,padding:6,overflow:"hidden"}}>
          <JapanMap
            prefSupport={displaySupport}
            partyColor={setup.partyColor}
            selectedBlock={null}
            onBlockClick={()=>{}}
            confirmedBlocks={confirmedBlocks}
          />
        </div>

        {/* RIGHT PANEL */}
        <div style={{width:210,background:"#111827",borderLeft:"1px solid #1f2937",padding:10,overflowY:"auto",flexShrink:0}}>
          {/* Player seats */}
          <div style={{background:"#1f2937",borderRadius:12,padding:10,marginBottom:10}}>
            <div style={{fontSize:9,color:"#6b7280",marginBottom:2}}>{setup.partyName}</div>
            <div style={{fontSize:34,fontWeight:700,color:setup.partyColor,lineHeight:1}}>{animSeats}</div>
            <div style={{fontSize:9,color:"#fbbf24",marginTop:2}}>/ 過半数 {MAJORITY}議席（全{TOTAL_SEATS}議席）</div>
            <div style={{height:5,background:"#374151",borderRadius:3,overflow:"hidden",marginTop:6}}>
              <div style={{height:"100%",background:setup.partyColor,width:`${Math.min(100,animSeats/TOTAL_SEATS*100)}%`,transition:"width .3s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginTop:4,color:"#6b7280"}}>
              <span>小選挙区: <span style={{color:"#93c5fd",fontWeight:700}}>{Math.round(playerSMD*Math.min(animSeats/Math.max(playerTotal,1),1))}</span></span>
              <span>比例: <span style={{color:"#86efac",fontWeight:700}}>{Math.round(playerPR*Math.min(animSeats/Math.max(playerTotal,1),1))}</span></span>
            </div>
          </div>

          {/* Rival seats */}
          <p style={{fontSize:9,color:"#6b7280",marginBottom:6,letterSpacing:1}}>他党</p>
          {rivalTotals.map(r=>{
            const prog=Math.round(r.total*Math.min(animSeats/Math.max(playerTotal,1),1));
            return(
              <div key={r.id} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>
                  <span style={{color:r.color,fontWeight:700}}>{r.name}</span>
                  <span style={{color:"#9ca3af"}}>{prog}議席</span>
                </div>
                <div style={{fontSize:8,color:"#4b5563",marginBottom:2}}>小:{Math.round(r.smd*Math.min(animSeats/Math.max(playerTotal,1),1))} 比:{Math.round(r.pr*Math.min(animSeats/Math.max(playerTotal,1),1))}</div>
                <div style={{height:3,background:"#1f2937",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",background:r.color,opacity:.7,width:`${Math.min(100,prog/TOTAL_SEATS*100)}%`}}/>
                </div>
              </div>
            );
          })}

          {/* Block progress */}
          <p style={{fontSize:9,color:"#6b7280",marginTop:8,marginBottom:6,letterSpacing:1}}>ブロック当確</p>
          {sortedBlocks.map(b=>{
            const isC=confirmedBlocks.includes(b.id);
            const block=BLOCKS.find(x=>x.id===b.id);
            const avg=Math.round(blockAvgSupport(b.id,displaySupport));
            return(
              <div key={b.id} style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                <span style={{fontSize:9,width:12,color:isC?"#fbbf24":"#374151"}}>{isC?"✓":"—"}</span>
                <span style={{fontSize:9,color:"#9ca3af",width:40,flexShrink:0}}>{block?.name}</span>
                <div style={{flex:1,height:4,background:"#1f2937",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",background:isC?setup.partyColor:"#374151",width:`${avg*2}%`,transition:"width .3s"}}/>
                </div>
                <span style={{fontSize:9,width:24,textAlign:"right",color:isC?setup.partyColor:"#6b7280"}}>{avg}%</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* TICKER */}
      <div style={{background:"#450a0a",borderTop:"1px solid #7f1d1d",padding:"5px 12px",flexShrink:0,overflow:"hidden"}}>
        <div style={{fontSize:9,color:"#fca5a5"}}>
          ■ 開票速報 ■ {setup.partyName}の開票が進行中 ■ 小選挙区{SMD_SEATS}議席＋比例{PR_SEATS}議席 ■ 各地から情報が続々と ■ 過半数は{MAJORITY}議席 ■
        </div>
      </div>

      {/* RESULT OVERLAY */}
      {phase==="result"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,zIndex:50,padding:20,overflowY:"auto"}}>
          <div style={{fontSize:10,letterSpacing:4,color:ending.color,fontWeight:700}}>{ending.grade}</div>
          <div style={{fontSize:28,fontWeight:900,textAlign:"center",color:ending.color,lineHeight:1.2,maxWidth:360}}>
            {ending.title}
          </div>
          <p style={{fontSize:13,color:"#d1d5db",textAlign:"center",maxWidth:320,lineHeight:1.7}}>{ending.body}</p>

          {/* 議席詳細テーブル */}
          <div style={{background:"#111827",border:"1px solid #374151",borderRadius:16,padding:14,width:"100%",maxWidth:360}}>
            <p style={{fontSize:10,color:"#6b7280",marginBottom:10,letterSpacing:1}}>最終議席数（全{TOTAL_SEATS}議席）</p>
            {/* Header */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 60px",gap:4,fontSize:9,color:"#6b7280",marginBottom:6,paddingBottom:4,borderBottom:"1px solid #1f2937"}}>
              <span>政党</span><span style={{textAlign:"center"}}>小選挙区</span><span style={{textAlign:"center"}}>比例</span><span style={{textAlign:"right"}}>合計</span>
            </div>
            {/* Player */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 60px",gap:4,alignItems:"center",marginBottom:8,padding:"6px 0"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:setup.partyColor}}/>
                <span style={{fontSize:11,fontWeight:700,color:"white"}}>{setup.partyName}</span>
              </div>
              <span style={{textAlign:"center",fontSize:12,color:"#93c5fd",fontWeight:700}}>{playerSMD}</span>
              <span style={{textAlign:"center",fontSize:12,color:"#86efac",fontWeight:700}}>{playerPR}</span>
              <span style={{textAlign:"right",fontSize:16,color:setup.partyColor,fontWeight:900}}>{playerTotal}</span>
            </div>
            {/* Rivals */}
            {rivalTotals.map(r=>(
              <div key={r.id} style={{display:"grid",gridTemplateColumns:"1fr 50px 50px 60px",gap:4,alignItems:"center",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:r.color}}/>
                  <span style={{fontSize:10,color:"#9ca3af"}}>{r.name}</span>
                </div>
                <span style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>{r.smd}</span>
                <span style={{textAlign:"center",fontSize:11,color:"#94a3b8"}}>{r.pr}</span>
                <span style={{textAlign:"right",fontSize:13,color:r.color,fontWeight:700}}>{r.total}</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid #1f2937",marginTop:8,paddingTop:8}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                <span style={{color:"#6b7280"}}>全国平均得票率</span>
                <span style={{color:"#d1d5db",fontWeight:700}}>{avgSup}%</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                <span style={{color:"#6b7280"}}>過半数まで</span>
                <span style={{color:playerTotal>=MAJORITY?"#22c55e":"#ef4444",fontWeight:700}}>
                  {playerTotal>=MAJORITY?"✓ 達成！":`あと${MAJORITY-playerTotal}議席`}
                </span>
              </div>
            </div>
          </div>

          <button onClick={onRestart}
            style={{padding:"11px 36px",borderRadius:12,border:"none",background:setup.partyColor,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
            もう一度プレイ
          </button>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// ROOT APP
// ════════════════════════════════════════════════════════════
function App(){
  const [phase, setPhase]       = useState("setup");
  const [setup, setSetup]       = useState(null);
  const [finalData, setFinalData] = useState(null);

  function handleStart(cfg){ setSetup(cfg); setPhase("game"); }
  function handleElection(ps,pf,rs){ setFinalData({ps,pf,rs}); setPhase("election"); }
  function handleRestart(){ setSetup(null); setFinalData(null); setPhase("setup"); }

  if(phase==="setup")    return <SetupScreen onStart={handleStart}/>;
  if(phase==="game")     return <GameScreen setup={setup} onElection={handleElection}/>;
  if(phase==="election") return <ElectionScreen
    setup={setup}
    finalPrefSupport={finalData.ps}
    finalPrefFame={finalData.pf}
    finalRivalSupport={finalData.rs}
    onRestart={handleRestart}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
