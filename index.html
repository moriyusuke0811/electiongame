<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格選挙シミュレーション</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white m-0 p-0 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">

const REGIONS = [
  { id: 'hokkaido', name: '北海道', population: 520, seats: 8, lean: { economy: 10, diplomacy: 5, social: 20 } },
  { id: 'tohoku', name: '東北', population: 860, seats: 13, lean: { economy: 20, diplomacy: -10, social: -20 } },
  { id: 'kitakanto', name: '北関東', population: 1100, seats: 19, lean: { economy: 0, diplomacy: -20, social: -10 } },
  { id: 'minamikanto', name: '南関東', population: 1600, seats: 23, lean: { economy: -20, diplomacy: 10, social: 30 } },
  { id: 'tokyo', name: '東京', population: 1400, seats: 19, lean: { economy: -30, diplomacy: 30, social: 40 } },
  { id: 'hokuriku', name: '北陸信越', population: 680, seats: 10, lean: { economy: 15, diplomacy: -30, social: -40 } },
  { id: 'tokai', name: '東海', population: 1450, seats: 21, lean: { economy: -10, diplomacy: -5, social: 0 } },
  { id: 'kinki', name: '近畿', population: 2050, seats: 28, lean: { economy: -40, diplomacy: -10, social: 10 } },
  { id: 'chugoku', name: '中国', population: 720, seats: 10, lean: { economy: 25, diplomacy: -40, social: -50 } },
  { id: 'shikoku', name: '四国', population: 360, seats: 6, lean: { economy: 30, diplomacy: -30, social: -40 } },
  { id: 'kyushu', name: '九州', population: 1250, seats: 20, lean: { economy: 10, diplomacy: -20, social: -10 } }
];

const TOTAL_SEATS = REGIONS.reduce((sum, r) => sum + r.seats, 0);
const MAX_TURNS = 24;

const ElectionSimulation = () => {
  const [gameState, setGameState] = React.useState('setup'); 
  const [turn, setTurn] = React.useState(1);
  const [funds, setFunds] = React.useState(1000);
  const [partyName, setPartyName] = React.useState('新党みらい');
  const [ideology, setIdeology] = React.useState({ economy: 0, diplomacy: 0, social: 0 });
  const [homeRegion, setHomeRegion] = React.useState('tokyo');
  
  const [support, setSupport] = React.useState({});
  const [logs, setLogs] = React.useState([]);
  const [selectedRegion, setSelectedRegion] = React.useState(null);
  const [polls, setPolls] = React.useState(null);
  const [electionResults, setElectionResults] = React.useState(null);

  React.useEffect(() => {
    if (gameState === 'setup') {
      const initialSupport = {};
      REGIONS.forEach(r => {
        initialSupport[r.id] = 5; 
      });
      setSupport(initialSupport);
    }
  }, [gameState]);

  const calculateMatch = (regionId) => {
    const region = REGIONS.find(r => r.id === regionId);
    let matchScore = 0;
    
    matchScore += 100 - Math.abs(ideology.economy - region.lean.economy);
    matchScore += 100 - Math.abs(ideology.diplomacy - region.lean.diplomacy);
    matchScore += 100 - Math.abs(ideology.social - region.lean.social);
    
    return matchScore / 3; 
  };

  const startGame = () => {
    let newSupport = { ...support };
    REGIONS.forEach(r => {
      const match = calculateMatch(r.id);
      newSupport[r.id] = Math.max(1, Math.min(100, Math.round((match / 100) * 15)));
    });
    
    newSupport[homeRegion] = Math.min(100, newSupport[homeRegion] + 15);
    
    setSupport(newSupport);
    setGameState('playing');
    addLog('党を結成し、政治活動を開始しました。');
  };

  const addLog = (msg) => {
    setLogs(prev => [`第${turn}週: ${msg}`, ...prev].slice(0, 5));
  };

  const nextTurn = () => {
    if (turn >= MAX_TURNS) {
      startElection();
    } else {
      setTurn(t => t + 1);
    }
  };

  const doAction = (type, regionId = null) => {
    let newFunds = funds;
    let newSupport = { ...support };
    
    if (type === 'speech') {
      newSupport[regionId] = Math.min(100, newSupport[regionId] + Math.random() * 3 + 1);
      addLog(`${REGIONS.find(r => r.id === regionId).name}で街頭演説を行いました。`);
    } 
    else if (type === 'cm' && funds >= 100) {
      newFunds -= 100;
      newSupport[regionId] = Math.min(100, newSupport[regionId] + Math.random() * 8 + 4);
      addLog(`${REGIONS.find(r => r.id === regionId).name}に地方CMを投下しました。`);
    }
    else if (type === 'fundraise') {
      const avgSupport = Object.values(support).reduce((a, b) => a + b, 0) / REGIONS.length;
      const raised = Math.floor(Math.random() * 100 + avgSupport * 5);
      newFunds += raised;
      addLog(`資金集めパーティーを開催し、${raised}万円を集めました。`);
    }
    else if (type === 'national_net' && funds >= 300) {
      newFunds -= 300;
      REGIONS.forEach(r => {
        newSupport[r.id] = Math.min(100, newSupport[r.id] + Math.random() * 4 + 1);
      });
      addLog(`全国ネット広告を展開しました。`);
    } else {
      return; 
    }

    setFunds(newFunds);
    setSupport(newSupport);
    nextTurn();
    setSelectedRegion(null);
  };

  const conductPolls = () => {
    const newPolls = {
      a: { name: 'A新聞 (リベラル系)', bias: ideology.social > 0 ? 5 : -5 },
      b: { name: 'B通信 (中立系)', bias: 0 },
      c: { name: 'C新聞 (保守系)', bias: ideology.social < 0 ? 5 : -5 }
    };

    Object.keys(newPolls).forEach(key => {
      let estSeats = 0;
      REGIONS.forEach(r => {
        const estSupport = Math.max(0, Math.min(100, support[r.id] + newPolls[key].bias + (Math.random() * 6 - 3)));
        estSeats += Math.round((estSupport / 100) * r.seats * 1.5); 
      });
      newPolls[key].seats = Math.min(TOTAL_SEATS, estSeats);
    });

    setPolls(newPolls);
    addLog('各社から情勢調査が発表されました。');
    nextTurn();
  };

  const startElection = () => {
    setGameState('election');
    let results = { totalSeats: 0, regions: {} };
    
    REGIONS.forEach(r => {
      const finalSupport = Math.min(100, support[r.id] + (Math.random() * 10 - 5));
      const wonSeats = Math.min(r.seats, Math.round((finalSupport / 100) * r.seats * 1.8));
      results.regions[r.id] = { won: wonSeats, total: r.seats, support: finalSupport };
      results.totalSeats += wonSeats;
    });
    
    setElectionResults(results);
  };

  const getHeatmapColor = (sup) => {
    if (sup < 10) return 'bg-gray-700';
    if (sup < 20) return 'bg-red-900';
    if (sup < 30) return 'bg-red-800';
    if (sup < 40) return 'bg-red-600';
    if (sup < 50) return 'bg-red-500';
    return 'bg-red-400';
  };

  const avgSupport = Math.round(Object.values(support).reduce((a, b) => a + b, 0) / Math.max(1, Object.keys(support).length));

  if (gameState === 'setup') {
    return (
      <div className="min-h-screen bg-gray-900 text-white p-8">
        <div className="max-w-2xl mx-auto bg-gray-800 rounded-xl p-8 shadow-2xl border border-gray-700">
          <div className="text-5xl mb-4 text-center">🎌</div>
          <h1 className="text-3xl font-bold text-center mb-8">日本の選挙シミュレーション</h1>
          
          <div className="space-y-6">
            <div>
              <label className="block text-sm font-medium mb-2 text-gray-300">政党名</label>
              <input 
                type="text" 
                value={partyName}
                onChange={(e) => setPartyName(e.target.value)}
                className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500"
              />
            </div>

            <div className="grid grid-cols-1 gap-6">
              {[
                { key: 'economy', label: '経済軸', left: '財政出動・格差是正', right: '構造改革・緊縮' },
                { key: 'diplomacy', label: '外交軸', left: 'リベラル・対話', right: '保守・防衛強化' },
                { key: 'social', label: '社会軸', left: '多様性・進歩主義', right: '伝統・保守主義' }
              ].map(axis => (
                <div key={axis.key} className="bg-gray-700/50 p-4 rounded-lg">
                  <div className="flex justify-between text-sm mb-2">
                    <span className="text-blue-400">{axis.left}</span>
                    <span className="font-bold">{ideology[axis.key]}</span>
                    <span className="text-red-400">{axis.right}</span>
                  </div>
                  <input 
                    type="range" min="-100" max="100" 
                    value={ideology[axis.key]}
                    onChange={(e) => setIdeology({...ideology, [axis.key]: parseInt(e.target.value)})}
                    className="w-full accent-blue-500"
                  />
                </div>
              ))}
            </div>

            <div>
              <label className="block text-sm font-medium mb-2 text-gray-300">本拠地 (初期支持率ボーナス)</label>
              <select 
                value={homeRegion}
                onChange={(e) => setHomeRegion(e.target.value)}
                className="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500"
              >
                {REGIONS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>

            <button 
              onClick={startGame}
              className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition shadow-lg mt-8 text-lg"
            >
              結党して活動を開始する
            </button>
          </div>
        </div>
      </div>
    );
  }

  if (gameState === 'playing') {
    return (
      <div className="min-h-screen bg-gray-900 text-white p-4 md:p-8">
        <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
          
          <div className="lg:col-span-1 space-y-4">
            <div className="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
              <h2 className="text-xl font-bold mb-4">{partyName}</h2>
              <div className="space-y-4">
                <div className="flex items-center justify-between border-b border-gray-700 pb-2">
                  <span className="flex items-center text-gray-400"><span className="text-xl mr-2">📅</span> 期間</span>
                  <span className="font-bold text-xl">{turn} / {MAX_TURNS}週</span>
                </div>
                <div className="flex items-center justify-between border-b border-gray-700 pb-2">
                  <span className="flex items-center text-gray-400"><span className="mr-2">💴</span> 資金</span>
                  <span className="font-bold text-xl text-yellow-400">{funds}万円</span>
                </div>
                <div className="flex items-center justify-between border-b border-gray-700 pb-2">
                  <span className="flex items-center text-gray-400"><span className="mr-2">📈</span> 支持率</span>
                  <span className="font-bold text-xl text-blue-400">{avgSupport}%</span>
                </div>
              </div>
            </div>

            <div className="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
              <h3 className="font-bold mb-4 flex items-center"><span className="mr-2">⚡</span> 全国アクション</h3>
              <div className="space-y-3">
                <button 
                  onClick={() => doAction('fundraise')}
                  className="w-full bg-gray-700 hover:bg-gray-600 py-3 rounded text-sm font-bold transition flex items-center justify-center"
                >
                  <span className="mr-2">💴</span> 資金パーティー (ターン消費)
                </button>
                <button 
                  onClick={() => doAction('national_net')}
                  disabled={funds < 300}
                  className={`w-full py-3 rounded text-sm font-bold transition flex items-center justify-center ${funds >= 300 ? 'bg-blue-600 hover:bg-blue-700' : 'bg-gray-700 opacity-50 cursor-not-allowed'}`}
                >
                  <span className="mr-2">📺</span> 全国ネット広告 (300万円)
                </button>
                {MAX_TURNS - turn <= 4 && (
                  <button 
                    onClick={conductPolls}
                    className="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded text-sm font-bold transition flex items-center justify-center animate-pulse"
                  >
                    <span className="mr-2">📊</span> 情勢調査を見る (ターン消費)
                  </button>
                )}
              </div>
            </div>

            <div className="bg-gray-800 p-4 rounded-xl border border-gray-700 h-48 overflow-y-auto">
              <h3 className="text-sm font-bold text-gray-400 mb-2 sticky top-0 bg-gray-800">活動ログ</h3>
              <div className="space-y-2 text-sm">
                {logs.map((log, i) => <div key={i} className="text-gray-300">{log}</div>)}
              </div>
            </div>
          </div>

          <div className="lg:col-span-3">
            <div className="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg min-h-[600px] flex flex-col relative">
              
              {polls && (
                <div className="absolute top-4 right-4 bg-gray-900 border border-gray-600 p-4 rounded-lg shadow-2xl z-10 w-64">
                  <h4 className="font-bold mb-3 border-b border-gray-700 pb-1 flex items-center"><span className="mr-2">📰</span> 最新情勢調査</h4>
                  <div className="space-y-2 text-sm">
                    {Object.values(polls).map(p => (
                      <div key={p.name} className="flex justify-between">
                        <span className="text-gray-400">{p.name}</span>
                        <span className="font-bold text-blue-400">{p.seats}議席</span>
                      </div>
                    ))}
                    <div className="mt-2 pt-2 border-t border-gray-700 text-xs text-center text-gray-500">
                      過半数: {Math.ceil(TOTAL_SEATS/2)}議席
                    </div>
                  </div>
                </div>
              )}

              <h2 className="text-xl font-bold mb-6 flex items-center"><span className="mr-2">🗺️</span> 日本列島 支持率マップ</h2>
              
              <div className="flex-1 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 p-4">
                {REGIONS.map(region => (
                  <button
                    key={region.id}
                    onClick={() => setSelectedRegion(region.id)}
                    className={`relative p-4 rounded-xl transition-all duration-300 border-2 ${selectedRegion === region.id ? 'border-white scale-105' : 'border-gray-700 hover:border-gray-500'} ${getHeatmapColor(support[region.id])}`}
                  >
                    <div className="font-bold text-lg mb-1">{region.name}</div>
                    <div className="text-sm opacity-80">支持率: {Math.round(support[region.id])}%</div>
                    {homeRegion === region.id && <div className="absolute top-2 right-2 text-xl">🏠</div>}
                  </button>
                ))}
              </div>

              {selectedRegion && (
                <div className="mt-6 p-6 bg-gray-900 rounded-lg border border-gray-700 animate-fadeIn">
                  <div className="flex justify-between items-center mb-4">
                    <h3 className="text-xl font-bold text-blue-400">
                      {REGIONS.find(r => r.id === selectedRegion).name}での活動
                    </h3>
                    <button onClick={() => setSelectedRegion(null)} className="text-gray-500 hover:text-white">✕</button>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <button 
                      onClick={() => doAction('speech', selectedRegion)}
                      className="bg-gray-800 hover:bg-gray-700 p-4 rounded-lg border border-gray-600 text-left transition"
                    >
                      <div className="font-bold mb-1 flex items-center"><span className="text-center mr-2">👥</span> 街頭演説</div>
                      <div className="text-xs text-gray-400">資金0 / 支持率微増</div>
                    </button>
                    <button 
                      onClick={() => doAction('cm', selectedRegion)}
                      disabled={funds < 100}
                      className={`p-4 rounded-lg border text-left transition ${funds >= 100 ? 'bg-gray-800 hover:bg-gray-700 border-gray-600' : 'bg-gray-900 border-gray-800 opacity-50 cursor-not-allowed'}`}
                    >
                      <div className="font-bold mb-1 flex items-center"><span className="text-center mr-2">📰</span> 地方CM</div>
                      <div className="text-xs text-gray-400">資金100万 / 支持率大増</div>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (gameState === 'election') {
    const isWin = electionResults.totalSeats >= Math.ceil(TOTAL_SEATS / 2);
    return (
      <div className="min-h-screen bg-gray-900 text-white p-8 flex flex-col items-center justify-center">
        <div className="max-w-4xl w-full">
          <div className="text-center mb-12">
            <h1 className="text-4xl font-black text-red-500 mb-2 tracking-widest">開票速報</h1>
            <p className="text-xl text-gray-400">第4X回 衆議院議員総選挙</p>
          </div>

          <div className={`p-8 rounded-2xl text-center mb-8 border-4 ${isWin ? 'bg-blue-900/30 border-blue-500' : 'bg-red-900/30 border-red-500'}`}>
            <h2 className="text-3xl font-bold mb-4">{partyName}</h2>
            <div className="text-6xl font-black mb-2">{electionResults.totalSeats} <span className="text-2xl font-normal text-gray-400">/ {TOTAL_SEATS} 議席</span></div>
            <div className="text-2xl mt-4 font-bold">
              {isWin ? <span className="text-blue-400">過半数獲得！政権交代！</span> : <span className="text-red-400">過半数届かず...敗北</span>}
            </div>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {REGIONS.map(r => (
              <div key={r.id} className="bg-gray-800 p-4 rounded-lg border border-gray-700 flex flex-col items-center">
                <div className="font-bold text-gray-400 mb-2">{r.name}</div>
                <div className="text-2xl font-bold">
                  <span className="text-blue-400">{electionResults.regions[r.id].won}</span>
                  <span className="text-sm text-gray-500 ml-1">/ {r.seats}</span>
                </div>
                <div className="w-full bg-gray-700 h-2 rounded mt-3 overflow-hidden">
                  <div 
                    className="bg-blue-500 h-full" 
                    style={{width: `${(electionResults.regions[r.id].won / r.seats) * 100}%`}}
                  ></div>
                </div>
              </div>
            ))}
          </div>

          <button 
            onClick={() => window.location.reload()}
            className="mt-12 mx-auto block bg-gray-700 hover:bg-gray-600 text-white px-8 py-3 rounded-full font-bold transition"
          >
            もう一度挑戦する
          </button>
        </div>
      </div>
    );
  }

  return null;
};

try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<ElectionSimulation />);
} catch (error) {
  console.error("Reactの描画エラー:", error);
  document.getElementById('root').innerHTML = `
      <div class="p-8 text-center text-red-400">
          <h2 class="text-2xl font-bold mb-4">エラーが発生しました</h2>
          <p>コードに構文エラーがあります。</p>
      </div>
  `;
}

    </script>
</body>
</html>
