        // ─── HELPERS ────────────────────────────────────────────────
        function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

        function calcMatch(pe,pd,ps,block){
        const d = Math.sqrt((pe-block.econ)**2+(pd-block.diplo)**2+(ps-block.social)**2);
        return 1 - d/Math.sqrt(3*200*200);
        }

        function ideologyLabel(v){
        if(v<=-60)return"強左"; if(v<=-20)return"中道左"; if(v<=20)return"中道";
        if(v<=60)return"中道右"; return"強右";
        }

        function supportColor(pct){
        if(pct<5) return"#1e293b";
        if(pct<15)return"#312e5a";
        if(pct<25)return"#4c1d95";
        if(pct<35)return"#7c3aed";
        if(pct<45)return"#a855f7";
        if(pct<55)return"#e11d48";
        if(pct<65)return"#f97316";
        return"#eab308";
        }

        // ─── JAPAN MAP ──────────────────────────────────────────────
        function JapanMap({ support, partyColor, selectedBlock, onBlockClick, confirmedBlocks }) {
        const [hovered, setHovered] = useState(null);
        const confirmed = confirmedBlocks || [];

        return (
            <div style={{position:"relative",width:"100%",paddingBottom:"70%"}}>
            <svg viewBox="120 10 260 280" style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
                <rect x="120" y="10" width="260" height="280" fill="#0f172a" rx="6"/>
                {BLOCKS.map(b => {
                const pct = support[b.id] || 0;
                const isConf = confirmed.includes(b.id);
                const isSel = selectedBlock === b.id;
                const isHov = hovered === b.id;
                const col = isConf ? partyColor : supportColor(pct);
                return (
                    <g key={b.id}
                    onClick={() => onBlockClick(b.id)}
                    onMouseEnter={() => setHovered(b.id)}
                    onMouseLeave={() => setHovered(null)}
                    style={{cursor:"pointer"}}>
                    <path d={b.svgPath} fill={col}
                        stroke={isSel?"#fbbf24":isHov?"#94a3b8":"#1e293b"}
                        strokeWidth={isSel?2:0.8}
                        style={{transition:"fill 0.5s"}}/>
                    <text x={b.lx} y={b.ly-4} textAnchor="middle" fontSize="5"
                        fill="rgba(255,255,255,0.9)" fontWeight="600"
                        style={{pointerEvents:"none",fontFamily:"sans-serif"}}>{b.name}</text>
                    <text x={b.lx} y={b.ly+4} textAnchor="middle" fontSize="5"
                        fill="rgba(255,255,255,0.75)"
                        style={{pointerEvents:"none",fontFamily:"sans-serif"}}>
                        {isConf ? "当確" : Math.round(pct)+"%"}
                    </text>
                    </g>
                );
                })}

                    <div style={{width:8,height:8,borderRadius:2,background:c}}/>
                    <span>{l}</span>
                </div>
                ))}
            </div>
            </div>
        );

        // ─── SPEECH MODAL ───────────────────────────────────────────
        function SpeechModal({ blockId, prefSupport, members, onSpeech, onClose }) {
        const [selected, setSelected] = useState(null);
        const block = BLOCKS.find(b => b.id === blockId);
        const prefs = PREFECTURES.filter(p => p.blockId === blockId);
        const blockMembers = members.filter(m => m.location === blockId).length;

        return (
            <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>

                        style={{
                        borderRadius:8,padding:"8px 10px",border:`1px solid ${selected===p.id?"#fbbf24":"#374151"}`,
                        background:selected===p.id?"rgba(251,191,36,0.1)":"#1f2937",

            </div>

        // ─── GAME SCREEN ────────────────────────────────────────────
        function GameScreen({ setup, onElection }) {
        const [turn, setTurn] = useState(1);
        const [funds, setFunds] = useState(500);
        const [support, setSupport] = useState(setup.support);
        const [prefSupport, setPrefSupport] = useState(setup.prefSupport);
        const [rivalSupport, setRivalSupport] = useState(setup.rivalSupport);
        const [members, setMembers] = useState([makeMember(), makeMember()]);
        const [selectedBlock, setSelectedBlock] = useState(null);
        const [actionDone, setActionDone] = useState(false);
        const [log, setLog] = useState(["第1週：選挙戦が始まった！"]);
        const [showPolling, setShowPolling] = useState(false);
        const [showMembers, setShowMembers] = useState(false);
        const [showSpeech, setShowSpeech] = useState(false);
        const [currentNews, setCurrentNews] = useState(null);
        const [usedNewsIds, setUsedNewsIds] = useState([]);
        const [notif, setNotif] = useState(null);
        const [tab, setTab] = useState("map");

        const isElectionPhase = turn > ELECTION_PHASE_START;
        const avgSupport = Math.round(
            BLOCKS.reduce((s,b)=>s+(support[b.id]||0)*b.pop,0) /
            BLOCKS.reduce((s,b)=>s+b.pop,0)
        );

        function showNotif(msg, type="info") {
            setNotif({msg,type});
            setTimeout(()=>setNotif(null), 2500);
        }

        function addLog(msg) { setLog(l=>[`第${turn}週: ${msg}`, ...l.slice(0,29)]); }

        function generateNews() {
            const available = NEWS_POOL.map((n,i)=>({n,i})).filter(({i})=>!usedNewsIds.includes(i));
            if (available.length === 0) return;
            const pick = available[Math.floor(Math.random()*available.length)];
            setUsedNewsIds(p=>[...p, pick.i]);
            if (pick.n.rivalPenalty) {
            setRivalSupport(prev => {
                const next = {...prev};
                const rs = {...(next[pick.n.rivalPenalty]||{})};
                BLOCKS.forEach(b => { rs[b.id] = clamp((rs[b.id]||20)-(3+Math.random()*3), 1, 80); });
                next[pick.n.rivalPenalty] = rs;
                return next;
            });
            }
            setCurrentNews(pick.n);
        }

        function applyPassiveBoosts(sup, prefSup) {
            const ns = {...sup}, np = {...prefSup};
            members.forEach(m => {
            if (m.location === "HQ") return;
            const boost = m.level * 0.5;
            ns[m.location] = clamp((ns[m.location]||0)+boost, 1, 92);
            PREFECTURES.filter(p=>p.blockId===m.location).forEach(p=>{
                np[p.id] = clamp((np[p.id]||0)+boost*0.7, 1, 92);
            });
            });
            return {ns, np};
        }

        function applyRivalAI(rs) {
            const next = {...rs};
            RIVALS.forEach(r => {
            if (Math.random() > r.aggression) return;
            const b = BLOCKS[Math.floor(Math.random()*BLOCKS.length)];
            next[r.id] = {...(next[r.id]||{})};
            next[r.id][b.id] = clamp((next[r.id][b.id]||15)+1+Math.random()*3, 1, 78);
            });
            return next;
        }

        function nextTurn() {
            if (turn >= TOTAL_TURNS) { onElection(support, prefSupport, rivalSupport); return; }
            const {ns, np} = applyPassiveBoosts(support, prefSupport);
            BLOCKS.forEach(b=>{ ns[b.id]=clamp((ns[b.id]||0)+(Math.random()-0.52)*1.2,1,92); });
            PREFECTURES.forEach(p=>{ np[p.id]=clamp((np[p.id]||0)+(Math.random()-0.52)*1.5,1,92); });
            setSupport(ns); setPrefSupport(np);
            setRivalSupport(prev=>applyRivalAI(prev));
            const nt = turn+1;
            setTurn(nt); setActionDone(false); setSelectedBlock(null);
            if (nt % 2 === 0) generateNews();
            if (nt === ELECTION_PHASE_START+1) { addLog("⚡ 選挙期間突入！情勢調査解禁"); showNotif("選挙期間突入！情勢調査を確認しよう","success"); }
            else { addLog("次の週が始まった"); }
        }

        function doSpeech(prefId) {
            const pref = PREFECTURES.find(p=>p.id===prefId);
            const blockMembers = members.filter(m=>m.location===pref.blockId).length;
            const base = 2.5+Math.random()*3;
            const gain = base*(1+blockMembers*0.5);
            setSupport(prev=>({...prev,[pref.blockId]:clamp((prev[pref.blockId]||0)+gain*0.4,1,92)}));
            setPrefSupport(prev=>({...prev,[prefId]:clamp((prev[prefId]||0)+gain,1,92)}));
            addLog(`${pref.name}で街頭演説 +${gain.toFixed(1)}%`);
            showNotif(`${pref.name}で演説！+${gain.toFixed(1)}%`,"success");
            setShowSpeech(false); setSelectedBlock(null);
            setActionDone(true);
        }

        function doCM(blockId) {
            if (funds < 80) { showNotif("資金不足（80万円必要）","error"); return; }
            const gain = 5+Math.random()*5;
            const b = BLOCKS.find(x=>x.id===blockId);
            setSupport(prev=>({...prev,[blockId]:clamp((prev[blockId]||0)+gain,1,92)}));
            PREFECTURES.filter(p=>p.blockId===blockId).forEach(p=>{
            setPrefSupport(prev=>({...prev,[p.id]:clamp((prev[p.id]||0)+gain*0.8,1,92)}));
            });
            setFunds(f=>f-80);
            addLog(`${b.name}でCM投下 +${gain.toFixed(1)}%`);
            showNotif(`${b.name}でCM効果！`,"success");
            setSelectedBlock(null); setActionDone(true);
        }

        function doNetAd() {
            if (funds < 120) { showNotif("資金不足（120万円必要）","error"); return; }
            const gain = 1+Math.random()*1.5;
            setSupport(prev=>{const n={...prev};BLOCKS.forEach(b=>{n[b.id]=clamp((prev[b.id]||0)+gain,1,92);});return n;});
            setFunds(f=>f-120);
            addLog(`ネット広告 全国+${gain.toFixed(1)}%`);
            showNotif("ネット広告が全国に拡散！","success");
            setActionDone(true);
        }

        function doPolicy() {
            if (funds < 60) { showNotif("資金不足（60万円必要）","error"); return; }
            const gain = 0.8+Math.random()*1.2;
            setSupport(prev=>{const n={...prev};BLOCKS.forEach(b=>{n[b.id]=clamp((prev[b.id]||0)+gain,1,92);});return n;});
            setFunds(f=>f-60);
            addLog(`政策発表 全国+${gain.toFixed(1)}%`);
            showNotif("政策発表が話題に！","success");
            setActionDone(true);
        }

        function doFundraise() {
            const earn = 80+Math.floor(Math.random()*100);
            setFunds(f=>f+earn);
            addLog(`資金パーティー +${earn}万円`);
            showNotif(`${earn}万円調達！`,"info");
            setActionDone(true);
        }

        function recruitMembers(n) {
            if (funds < 50*n) { showNotif("資金不足","error"); return; }
            setMembers(prev=>[...prev,...Array.from({length:n},()=>makeMember())]);
            setFunds(f=>f-50*n);
            showNotif(`${n}人の党員を採用！`,"success");
            addLog(`党員${n}人採用`);
        }

        function deployMember(memberId, blockId) {
            setMembers(prev=>prev.map(m=>m.id===memberId?{...m,location:blockId}:m));
            if (blockId === "HQ") showNotif("党員を本部に召還","info");
            else showNotif(`${BLOCKS.find(b=>b.id===blockId)?.name}に党員を派遣！`,"success");
        }

        const selBlock = BLOCKS.find(b=>b.id===selectedBlock);
        const rivalsInfo = RIVALS.map(r=>({
            ...r,
            avg: Math.round(BLOCKS.reduce((s,b)=>s+(rivalSupport[r.id]||{})[b.id]*b.pop,0)/BLOCKS.reduce((s,b)=>s+b.pop,0))
        }));

        const S = {
            root:{minHeight:"100vh",background:"#030712",color:"white",fontFamily:"'Hiragino Kaku Gothic ProN',Meiryo,sans-serif",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"},
            topBar:{background:"#111827",borderBottom:"1px solid #1f2937",padding:"6px 12px",display:"flex",alignItems:"center",gap:8,flexShrink:0},
            body:{flex:1,display:"flex",overflow:"hidden"},
            leftPanel:{width:152,background:"#111827",borderRight:"1px solid #1f2937",display:"flex",flexDirection:"column",flexShrink:0},
            center:{flex:1,display:"flex",flexDirection:"column",background:"#030712",position:"relative",overflow:"hidden"},
            rightPanel:{width:156,background:"#111827",borderLeft:"1px solid #1f2937",display:"flex",flexDirection:"column",flexShrink:0},
        };

        return (
            <div style={S.root}>
            {/* TOP BAR */}
            <div style={S.topBar}>
                <div style={{width:10,height:10,borderRadius:"50%",background:setup.partyColor,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:700}}>{setup.partyName}</span>
                <span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:isElectionPhase?"#7f1d1d":"#1f2937",color:isElectionPhase?"#fca5a5":"#6b7280",marginLeft:4}}>
                {isElectionPhase?"⚡ 選挙期間":"通常活動"}
                </span>
                <span style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginLeft:"auto"}}>第{turn}/{TOTAL_TURNS}週</span>
                <span style={{fontSize:10,color:"#6b7280"}}>残{TOTAL_TURNS-turn+1}週</span>
            </div>

            <div style={S.body}>
                {/* LEFT PANEL */}
                <div style={S.leftPanel}>
                <div style={{padding:8,flex:1,overflowY:"auto"}}>
                    {/* Stats */}
                    {[
                    {label:"全国平均支持率",val:`${avgSupport}%`,col:avgSupport>=30?"#22c55e":"#ef4444"},
                    {label:"資金",val:`${funds}万円`,col:funds>=100?"#60a5fa":"#ef4444"},
                    {label:"党員 / 配置",val:`${members.length}人 / ${members.filter(m=>m.location!=="HQ").length}人`,col:"#c084fc"},
                    ].map(s=>(
                    <div key={s.label} style={{background:"#1f2937",borderRadius:8,padding:"7px 8px",marginBottom:6}}>
                        <div style={{fontSize:9,color:"#6b7280",marginBottom:2}}>{s.label}</div>
                        <div style={{fontSize:12,fontWeight:700,color:s.col}}>{s.val}</div>
                    </div>
                    ))}

                    {/* Tabs */}
                    <div style={{display:"flex",border:"1px solid #374151",borderRadius:8,overflow:"hidden",marginBottom:8,marginTop:2}}>
                    {[["map","地図"],["rivals","他党"],["log","記録"]].map(([t,l])=>(
                        <button key={t} onClick={()=>setTab(t)}
                        style={{flex:1,padding:"4px 0",fontSize:9,background:tab===t?"#374151":"transparent",color:tab===t?"white":"#6b7280",border:"none",cursor:"pointer"}}>
                        {l}
                        </button>
                    ))}
                    </div>

                    {tab==="map" && BLOCKS.sort((a,b)=>(support[b.id]||0)-(support[a.id]||0)).map(b=>(
                    <div key={b.id} style={{marginBottom:6}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:2}}>
                        <span style={{color:"#9ca3af"}}>{b.name}</span>
                        <span style={{color:support[b.id]>=30?"#22c55e":"#6b7280",fontWeight:700}}>{Math.round(support[b.id]||0)}%</span>
                        </div>
                        <div style={{height:4,background:"#1f2937",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",background:setup.partyColor,opacity:.8,width:`${Math.round(support[b.id]||0)}%`,transition:"width .5s"}}/>
                        </div>
                    </div>
                    ))}

                    {tab==="rivals" && (
                    <div>
                        {rivalsInfo.map(r=>(
                        <div key={r.id} style={{background:"#1f2937",borderRadius:8,padding:"7px 8px",marginBottom:6}}>
                            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:r.color}}/>
                            <span style={{fontSize:10,fontWeight:700,color:"white"}}>{r.name}</span>
                            </div>
                            <div style={{fontSize:10,color:"#9ca3af"}}>全国 <span style={{color:r.color,fontWeight:700}}>{r.avg}%</span></div>
                            <div style={{height:3,background:"#374151",borderRadius:2,overflow:"hidden",marginTop:4}}>
                            <div style={{height:"100%",background:r.color,opacity:.7,width:`${r.avg}%`}}/>
                            </div>
                            <div style={{fontSize:9,color:"#6b7280",marginTop:2}}>{r.desc}</div>
                        </div>
                        ))}
                        <div style={{background:"#1f2937",borderRadius:8,padding:"7px 8px",marginBottom:6}}>
                        <div style={{fontSize:10,fontWeight:700,color:"white",marginBottom:2}}>我が党</div>
                        <div style={{fontSize:10,color:"#9ca3af"}}>全国 <span style={{color:setup.partyColor,fontWeight:700}}>{avgSupport}%</span></div>
                        <div style={{height:3,background:"#374151",borderRadius:2,overflow:"hidden",marginTop:4}}>
                            <div style={{height:"100%",background:setup.partyColor,width:`${avgSupport}%`}}/>
                        </div>
                        </div>
                    </div>
                    )}

                    {tab==="log" && log.map((l,i)=>(
                    <div key={i} style={{fontSize:9,lineHeight:1.6,color:i===0?"#e2e8f0":"#4b5563",marginBottom:3}}>{l}</div>
                    ))}
                </div>
                </div>

                {/* CENTER MAP */}
                <div style={S.center}>
                <div style={{flex:1,padding:8}}>
                    <JapanMap support={support} partyColor={setup.partyColor}
                    selectedBlock={selectedBlock} onBlockClick={id=>{ if(!actionDone){setSelectedBlock(prev=>prev===id?null:id);} }}/>
                </div>

                {/* Block popup */}
                {selectedBlock && selBlock && !actionDone && (
                    <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",width:240,background:"#1e293b",border:"1px solid #334155",borderRadius:12,padding:12,boxShadow:"0 8px 32px rgba(0,0,0,.5)",zIndex:20}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:setup.partyColor}}/>
                        <span style={{fontSize:13,fontWeight:700,color:"white"}}>{selBlock.name}</span>
                        <span style={{fontSize:10,color:"#6b7280",marginLeft:"auto"}}>{Math.round(support[selectedBlock]||0)}%</span>
                    </div>
                    <button onClick={()=>setShowSpeech(true)}
                        style={{width:"100%",padding:"8px 12px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,cursor:"pointer",textAlign:"left",marginBottom:6,color:"white"}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#fcd34d"}}>🎙 街頭演説</span>
                        <span style={{fontSize:10,color:"#6b7280",marginLeft:8}}>無料 / 都道府県別</span>
                    </button>
                    <button onClick={()=>doCM(selectedBlock)}
                        style={{width:"100%",padding:"8px 12px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,cursor:"pointer",textAlign:"left",color:"white"}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#93c5fd"}}>📺 地方CM</span>
                        <span style={{fontSize:10,color:"#6b7280",marginLeft:8}}>-80万円 / +5〜10%</span>
                    </button>
                    <button onClick={()=>setSelectedBlock(null)}
                        style={{width:"100%",marginTop:8,fontSize:10,color:"#4b5563",background:"none",border:"none",cursor:"pointer"}}>
                        キャンセル
                    </button>
                    </div>
                )}

                {actionDone && (
                    <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:11,color:"#6b7280",background:"rgba(17,24,39,0.85)",padding:"6px 14px",borderRadius:20,whiteSpace:"nowrap"}}>
                    行動完了 → 右の「次の週へ」を押してください
                    </div>
                )}
                </div>

                {/* RIGHT PANEL */}
                <div style={S.rightPanel}>
                <div style={{padding:8,flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                    <p style={{fontSize:9,color:"#4b5563",letterSpacing:2,marginBottom:2}}>全国アクション</p>

                    {[
                    {label:"🌐 ネット広告",sub:"-120万円 / 全国",fn:doNetAd,col:"#3b82f6"},
                    {label:"📢 政策発表",sub:"-60万円 / 全国",fn:doPolicy,col:"#8b5cf6"},
                    {label:"💰 資金パーティー",sub:"+80〜180万円",fn:doFundraise,col:"#eab308"},
                    ].map(a=>(
                    <button key={a.label} onClick={a.fn} disabled={actionDone}
                        style={{
                        width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${actionDone?"#374151":a.col}`,
                        background:actionDone?"transparent":a.col+"18",color:actionDone?"#6b7280":a.col,
                        cursor:actionDone?"not-allowed":"pointer",textAlign:"left",opacity:actionDone?0.3:1,
                        }}>
                        <div style={{fontSize:11,fontWeight:700}}>{a.label}</div>
                        <div style={{fontSize:9,opacity:.6,marginTop:2}}>{a.sub}</div>
                    </button>
                    ))}

                    <button onClick={()=>setShowMembers(true)}
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #7c3aed",background:"rgba(124,58,237,0.1)",color:"#c4b5fd",cursor:"pointer",textAlign:"left"}}>
                    <div style={{fontSize:11,fontWeight:700}}>👥 党員管理</div>
                    <div style={{fontSize:9,opacity:.6,marginTop:2}}>{members.length}人 / 配置{members.filter(m=>m.location!=="HQ").length}人</div>
                    </button>

                    {isElectionPhase && (
                    <button onClick={()=>setShowPolling(true)}
                        style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #6366f1",background:"rgba(99,102,241,0.1)",color:"#a5b4fc",cursor:"pointer",textAlign:"left"}}>
                        <div style={{fontSize:11,fontWeight:700}}>📊 情勢調査</div>
                        <div style={{fontSize:9,opacity:.6,marginTop:2}}>各社の予測を確認</div>
                    </button>
                    )}

                    <div style={{borderTop:"1px solid #1f2937",paddingTop:8,marginTop:2}}>
                    <button onClick={nextTurn}
                        style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:setup.partyColor,color:"white",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                        {turn>=TOTAL_TURNS?"投開票へ →":"次の週へ →"}
                    </button>
                    </div>

                    {/* Rival quick view */}
                    <div style={{borderTop:"1px solid #1f2937",paddingTop:8}}>
                    <p style={{fontSize:9,color:"#4b5563",letterSpacing:1,marginBottom:6}}>他党トップ地盤</p>
                    {RIVALS.map(r=>{
                        const topB = BLOCKS.reduce((top,b)=>{
                        const cur = (rivalSupport[r.id]||{})[b.id]||0;
                        const topCur = (rivalSupport[r.id]||{})[top.id]||0;
                        return cur>topCur?b:top;
                        },BLOCKS[0]);
                        return(
                        <div key={r.id} style={{marginBottom:8}}>
                            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:1}}>
                            <div style={{width:6,height:6,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                            <span style={{fontSize:9,color:"#9ca3af",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</span>
                            <span style={{fontSize:9,fontWeight:700,color:r.color}}>
                                {Math.round((rivalSupport[r.id]||{})[topB.id]||0)}%
                            </span>
                            </div>
                            <div style={{fontSize:9,color:"#4b5563",paddingLeft:10}}>{topB.name}が最強</div>
                        </div>
                        );
                    })}
                    </div>
                </div>
                </div>
            </div>

            {/* NOTIFICATION */}
            {notif && (
                <div style={{
                position:"fixed",top:48,left:"50%",transform:"translateX(-50%)",zIndex:60,
                padding:"6px 16px",borderRadius:20,fontSize:12,fontWeight:700,color:"white",pointerEvents:"none",
                background:notif.type==="success"?"#16a34a":notif.type==="error"?"#dc2626":"#1d4ed8",
                }}>
                {notif.msg}
                </div>
            )}

            {currentNews && <NewsModal news={currentNews} onClose={()=>setCurrentNews(null)}/>}
            {showSpeech && selectedBlock && (
                <SpeechModal blockId={selectedBlock} prefSupport={prefSupport} members={members}
                onSpeech={doSpeech} onClose={()=>setShowSpeech(false)}/>
            )}
            {showMembers && (
                <MemberModal members={members} funds={funds} onRecruit={recruitMembers}
                onDeploy={deployMember} onClose={()=>setShowMembers(false)}/>
            )}
            {showPolling && (
                <PollingModal support={support} setup={setup} rivalSupport={rivalSupport}
                onClose={()=>setShowPolling(false)}/>
            )}
            </div>
        );
        }

        // ─── ELECTION SCREEN ────────────────────────────────────────
        function ElectionScreen({ setup, finalSupport, finalRivalSupport, onRestart }) {
        const [confirmedBlocks, setConfirmedBlocks] = useState([]);
        const [displaySupport, setDisplaySupport] = useState(Object.fromEntries(BLOCKS.map(b=>[b.id,0])));
        const [totalSeats, setTotalSeats] = useState(0);
        const [phase, setPhase] = useState("counting");

        const sortedBlocks = [...BLOCKS].sort((a,b)=>(finalSupport[b.id]||0)-(finalSupport[a.id]||0));

        useEffect(()=>{
            let step=0; const STEPS=70;
            const t = setInterval(()=>{
            step++;
            const progress = step/STEPS;
            const nd = {};
            BLOCKS.forEach(b=>{ nd[b.id]=Math.round((finalSupport[b.id]||0)*Math.min(progress*1.3,1)); });
            setDisplaySupport(nd);
            const cc = Math.floor(progress*BLOCKS.length);
            const nc = sortedBlocks.slice(0,cc).filter(b=>(finalSupport[b.id]||0)>28).map(b=>b.id);
            setConfirmedBlocks(nc);
            const seats = nc.reduce((s,id)=>{
                const b=BLOCKS.find(x=>x.id===id);
                return s+Math.min(b.seats,Math.round(b.seats*(finalSupport[id]/100)*1.3));
            },0);
            setTotalSeats(Math.min(seats,309));
            if(step>=STEPS){ clearInterval(t); setTimeout(()=>setPhase("result"),1200); }
            },110);
            return ()=>clearInterval(t);
        },[]);

        const finalSeats = Math.min(BLOCKS.reduce((s,b)=>s+Math.min(b.seats,Math.round(b.seats*((finalSupport[b.id]||0)/100)*1.3)),0),309);
        const won = finalSeats >= MAJORITY;
        const avgSup = Math.round(BLOCKS.reduce((s,b)=>s+(finalSupport[b.id]||0)*b.pop,0)/BLOCKS.reduce((s,b)=>s+b.pop,0));
        const rivalFinal = RIVALS.map(r=>({
            ...r,
            seats: Math.min(200, BLOCKS.reduce((s,b)=>s+Math.min(b.seats,Math.round(b.seats*((finalRivalSupport[r.id]||{})[b.id]||10)/100*1.1)),0))
        }));

        return(
            <div style={{minHeight:"100vh",background:"#030712",color:"white",fontFamily:"'Hiragino Kaku Gothic ProN',Meiryo,sans-serif",display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"}}>
            <div style={{background:"#b91c1c",padding:"8px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:2,border:"1px solid rgba(255,255,255,0.6)",padding:"2px 6px"}}>NES</span>
                <span style={{fontSize:13,fontWeight:700}}>■ 衆議院総選挙 開票速報 ■ {setup.partyName}</span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.7)",marginLeft:"auto",fontWeight:700}}>● LIVE</span>
            </div>
            <div style={{flex:1,display:"flex",overflow:"hidden"}}>
                <div style={{flex:1,padding:8}}>
                <JapanMap support={displaySupport} partyColor={setup.partyColor}
                    selectedBlock={null} onBlockClick={()=>{}} confirmedBlocks={confirmedBlocks}/>
                </div>
                <div style={{width:200,background:"#111827",borderLeft:"1px solid #1f2937",padding:10,overflowY:"auto",flexShrink:0}}>
                <div style={{background:"#1f2937",borderRadius:12,padding:10,marginBottom:12}}>
                    <div style={{fontSize:9,color:"#6b7280"}}>{setup.partyName}</div>
                    <div style={{fontSize:36,fontWeight:700,color:setup.partyColor}}>{totalSeats}</div>
                    <div style={{fontSize:10,color:"#fbbf24"}}>過半数 {MAJORITY}議席</div>
                    <div style={{height:6,background:"#374151",borderRadius:3,overflow:"hidden",marginTop:6}}>
                    <div style={{height:"100%",background:setup.partyColor,width:`${Math.min(100,totalSeats/309*100)}%`,transition:"width .3s"}}/>
                    </div>
                </div>
                <p style={{fontSize:9,color:"#6b7280",marginBottom:6,letterSpacing:1}}>他党</p>
                {rivalFinal.map(r=>{
                    const prog = finalSeats>0?Math.min(r.seats,Math.round(totalSeats/finalSeats*r.seats)):0;
                    return(
                    <div key={r.id} style={{marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
                        <span style={{color:r.color}}>{r.name}</span>
                        <span style={{color:"#9ca3af"}}>{prog}議席</span>
                        </div>
                        <div style={{height:4,background:"#1f2937",borderRadius:2,overflow:"hidden",marginTop:2}}>
                        <div style={{height:"100%",background:r.color,opacity:.7,width:`${Math.min(100,prog/309*100)}%`}}/>
                        </div>
                    </div>
                    );
                })}
                <p style={{fontSize:9,color:"#6b7280",marginTop:10,marginBottom:6,letterSpacing:1}}>ブロック開票</p>
                {sortedBlocks.map(b=>{
                    const isC=confirmedBlocks.includes(b.id);
                    return(
                    <div key={b.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:9,width:12,color:isC?"#fbbf24":"#374151"}}>{isC?"✓":"—"}</span>
                        <span style={{fontSize:9,color:"#9ca3af",width:44,flexShrink:0}}>{b.name}</span>
                        <div style={{flex:1,height:4,background:"#1f2937",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",background:isC?setup.partyColor:"#374151",width:`${displaySupport[b.id]||0}%`,transition:"width .3s"}}/>
                        </div>
                        <span style={{fontSize:9,width:24,textAlign:"right",color:isC?setup.partyColor:"#6b7280"}}>{Math.round(displaySupport[b.id]||0)}%</span>
                    </div>
                    );
                })}
                </div>
            </div>

            {phase==="result" && (
                <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,zIndex:50,padding:16}}>
                <div style={{fontSize:40,fontWeight:900,textAlign:"center",color:won?setup.partyColor:"#ef4444"}}>
                    {won?"🎉 政権獲得！":"惜敗"}
                </div>
                <div style={{fontSize:14,color:"#d1d5db",textAlign:"center",maxWidth:280,lineHeight:1.6}}>
                    {won?`${setup.partyName}が過半数を突破。新政権が誕生しました！`:`${setup.partyName}は過半数に届きませんでした。野党として活動を継続します。`}
                </div>
                <div style={{background:"#111827",border:"1px solid #374151",borderRadius:16,padding:16,width:260}}>
                    <p style={{fontSize:10,color:"#6b7280",marginBottom:10,letterSpacing:1}}>最終結果</p>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:"50%",background:setup.partyColor}}/>
                    <span style={{fontSize:12,fontWeight:700,color:"white"}}>{setup.partyName}</span>
                    <span style={{fontSize:22,fontWeight:900,marginLeft:"auto",color:setup.partyColor}}>{finalSeats}</span>
                    </div>
                    {rivalFinal.map(r=>(
                    <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:r.color}}/>
                        <span style={{fontSize:11,color:"#9ca3af"}}>{r.name}</span>
                        <span style={{fontSize:14,fontWeight:700,marginLeft:"auto",color:r.color}}>{r.seats}</span>
                    </div>
                    ))}
                    <div style={{borderTop:"1px solid #374151",marginTop:8,paddingTop:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
                        <span style={{color:"#6b7280"}}>全国得票率</span>
                        <span style={{color:"#d1d5db",fontWeight:700}}>{avgSup}%</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}>
                        <span style={{color:"#6b7280"}}>過半数まで</span>
                        <span style={{color:won?"#22c55e":"#ef4444",fontWeight:700}}>{won?"達成！":`あと${MAJORITY-finalSeats}議席`}</span>
                    </div>
                    </div>
                </div>
                <button onClick={onRestart}
                    style={{padding:"10px 32px",borderRadius:12,border:"none",background:setup.partyColor,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    もう一度プレイ
                </button>
                </div>
            )}

            <div style={{background:"#450a0a",borderTop:"1px solid #7f1d1d",padding:"6px 12px",flexShrink:0,overflow:"hidden"}}>
                <div style={{fontSize:9,color:"#fca5a5"}}>
                ■ 開票速報 ■ {setup.partyName}の開票が進行中 ■ 各地ブロックで当確が出始めた ■ 全国から続々と情報が入っています ■
                </div>
            </div>
            </div>
        );
        }

        // ─── ROOT ───────────────────────────────────────────────────
        function App() {
        const [phase, setPhase] = useState("setup");
        const [setup, setSetup] = useState(null);
        const [finalData, setFinalData] = useState(null);

        function handleStart(cfg) { setSetup(cfg); setPhase("game"); }
        function handleElection(sup, prefSup, rivalSup) { setFinalData({sup,prefSup,rivalSup}); setPhase("election"); }
        function handleRestart() { setSetup(null); setFinalData(null); setPhase("setup"); }

        if (phase==="setup") return <SetupScreen onStart={handleStart}/>;
        if (phase==="game") return <GameScreen setup={setup} onElection={handleElection}/>;
        if (phase==="election") return <ElectionScreen setup={setup} finalSupport={finalData.sup} finalRivalSupport={finalData.rivalSup} onRestart={handleRestart}/>;
        return null;
        }
        // ==========================================
        // ↓↓↓ ここにClaudeが出力したJSXコードを貼り付ける ↓↓↓
        // ==========================================

        function ElectionGame() {
            // 例：ここにClaudeのコンポーネントコードが入る
            return <div class="p-8 text-center text-2xl">ゲームを読み込み中...</div>;
        }

        // ==========================================
        // ↑↑↑ ここにClaudeが出力したJSXコードを貼り付ける ↑↑↑
        // ==========================================

        // 最後に画面に描画する処理（Claudeのコードの末尾にこれが無ければ追加してください）
        const root = bankrupt = ReactDOM.createRoot(document.getElementById('root'));
        // ※ ElectionGame の部分は、Claudeが作った一番親のコンポーネント名（Appなど）に合わせてください
        root.render(<ElectionGame />);
        
    </script>
</body>
</html>
